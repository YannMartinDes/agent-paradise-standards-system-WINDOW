# =============================================================================
# Release Create - Tag + publish on merge to release
# =============================================================================
#
# Triggered when a PR merges into `release`. Creates git tags and publishes
# APSS crates to crates.io.
#
# Flow:
#   1. Detect which crates had version bumps since last release tag
#   2. Create git tags (system + per-standard/substandard)
#   3. Create GitHub Release with changelog from merge commit
#   4. Publish APSS crates to crates.io (with approval gate)
#
# Publish scope (DI01 spec section 9.4 as amended by ADR-0002): crates.io is
# the standard distribution transport. Publish order:
#   Tier 1: apss-core (always first when the system changed)
#   Tier 2: changed OFFICIAL standard crates (standards/v1/APS-V1-XXXX-slug,
#           excluding APS-V1-0000-meta), in dependency order after apss-core
#   Tier 3: apss bootstrap binary (last, may depend on published standards)
# Experiments and meta-standard internal substandards (CF01/DI01/CL01/SS01)
# are NOT published. They still get git tags and release notes here.
# =============================================================================

name: Release Create

on:
  push:
    branches: [release]

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------------------
  # Detect version changes
  # ---------------------------------------------------------------------------
  detect-changes:
    name: Detect version changes
    runs-on: ubuntu-latest
    outputs:
      system_changed: ${{ steps.detect.outputs.system_changed }}
      system_version: ${{ steps.detect.outputs.system_version }}
      changed_crates: ${{ steps.detect.outputs.changed_crates }}
      standards_changed: ${{ steps.detect.outputs.standards_changed }}
      tag_list: ${{ steps.detect.outputs.tag_list }}
      has_changes: ${{ steps.detect.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed versions since last release
        id: detect
        run: |
          set -euo pipefail

          # Find the previous release tag (most recent v1.x.y tag)
          LAST_TAG=$(git tag -l 'v1.*' --sort=-v:refname | head -1 || echo "")
          if [ -z "$LAST_TAG" ]; then
            echo "No previous release tag found - treating all crates as new"
            BASE=$(git rev-list --max-parents=0 HEAD)
          else
            echo "Last release tag: $LAST_TAG"
            BASE="$LAST_TAG"
          fi

          CHANGED_CRATES="[]"
          TAG_LIST=""
          SYSTEM_CHANGED="false"
          HAS_CHANGES="false"

          # --- System version check ---
          SYSTEM_VERSION=$(grep -A1 '^\[workspace.package\]' Cargo.toml | grep 'version' | sed 's/.*= *"\(.*\)"/\1/')
          echo "Current system version: $SYSTEM_VERSION"

          SYSTEM_CRATE_DIRS=("crates/apss-core" "crates/aps-cli" "crates/apss-bootstrap")
          for dir in "${SYSTEM_CRATE_DIRS[@]}"; do
            if [ -d "$dir" ] && ! git diff --quiet "$BASE" HEAD -- "$dir" 2>/dev/null; then
              SYSTEM_CHANGED="true"
              HAS_CHANGES="true"
              break
            fi
          done

          if [ "$SYSTEM_CHANGED" = "true" ]; then
            TAG_LIST="v${SYSTEM_VERSION}"
            echo "System changed - will tag v${SYSTEM_VERSION}"
          fi

          # --- Standard version detection ---
          detect_crate() {
            local dir="$1"
            local meta_file="$2"
            local tag_prefix="$3"
            local crate_name="$4"
            local tier="$5"

            if ! git diff --quiet "$BASE" HEAD -- "$dir" 2>/dev/null; then
              # Skip docs-only changes
              NON_DOC=$(git diff --name-only "$BASE" HEAD -- "$dir" | grep -v "^${dir}/docs/" || true)
              if [ -z "$NON_DOC" ]; then
                return
              fi

              local version=""
              if [ -f "$dir/$meta_file" ]; then
                version=$(grep "^version" "$dir/$meta_file" | head -1 | sed 's/.*= *"\(.*\)"/\1/')
              fi

              if [ -n "$version" ]; then
                local tag="${tag_prefix}-v${version}"
                echo "  Changed: $crate_name @ $version → tag $tag (tier $tier)"

                # Append to JSON array
                CHANGED_CRATES=$(echo "$CHANGED_CRATES" | jq --arg name "$crate_name" --arg ver "$version" --arg t "$tier" --arg d "$dir" \
                  '. + [{"name": $name, "version": $ver, "tier": ($t | tonumber), "dir": $d}]')

                if [ -n "$TAG_LIST" ]; then
                  TAG_LIST="${TAG_LIST},${tag}"
                else
                  TAG_LIST="${tag}"
                fi
                HAS_CHANGES="true"
              fi
            fi
          }

          echo ""
          echo "=== Scanning standards ==="

          # Standards
          for dir in standards/v1/APS-V1-*; do
            [ -d "$dir" ] || continue
            id=$(basename "$dir" | sed 's/-.*//' | sed 's/APS-V1-//')
            slug=$(basename "$dir" | sed 's/^APS-V1-[0-9]*-//')
            crate_name="apss-v1-${id}-${slug}"
            tag_prefix="APS-V1-${id}"

            # Check if this is a meta substandard parent (tier 2) or regular (tier 3)
            if [ "$id" = "0000" ]; then
              detect_crate "$dir" "standard.toml" "$tag_prefix" "apss-v1-0000-meta" "2"
            else
              detect_crate "$dir" "standard.toml" "$tag_prefix" "$crate_name" "3"
            fi

            # Substandards
            if [ -d "$dir/substandards" ]; then
              for sub in "$dir"/substandards/*/; do
                [ -d "$sub" ] || continue
                sub="${sub%/}"
                profile=$(basename "$sub" | sed 's/-.*//')
                sub_slug=$(basename "$sub" | sed 's/^[A-Z]*[0-9]*-//')
                sub_crate="apss-${profile,,}-${sub_slug}"

                if [ "$id" = "0000" ]; then
                  detect_crate "$sub" "substandard.toml" "${tag_prefix}.${profile}" "$sub_crate" "2"
                else
                  detect_crate "$sub" "substandard.toml" "${tag_prefix}.${profile}" "$sub_crate" "3"
                fi
              done
            fi
          done

          # Experiments
          for dir in standards-experimental/v1/*/; do
            [ -d "$dir" ] || continue
            dir="${dir%/}"
            exp_name=$(basename "$dir")
            detect_crate "$dir" "experiment.toml" "$exp_name" "$exp_name" "3"
          done

          # Bootstrap binary
          if [ -d "crates/apss-bootstrap" ] && ! git diff --quiet "$BASE" HEAD -- "crates/apss-bootstrap" 2>/dev/null; then
            BOOT_VER=$(grep '^version' crates/apss-bootstrap/Cargo.toml | head -1 | sed 's/.*= *"\(.*\)"/\1/')
            if [ -n "$BOOT_VER" ]; then
              echo "  Changed: apss (bootstrap) @ $BOOT_VER (tier 4)"
              CHANGED_CRATES=$(echo "$CHANGED_CRATES" | jq --arg ver "$BOOT_VER" \
                '. + [{"name": "apss", "version": $ver, "tier": 4, "dir": "crates/apss-bootstrap"}]')
              HAS_CHANGES="true"
            fi
          fi

          # Did any OFFICIAL standard crate change? Official standard crates live
          # under standards/v1/APS-V1-XXXX-slug with XXXX != 0000. This filter
          # excludes the meta-standard (APS-V1-0000), its internal substandards
          # (dir under standards/v1/APS-V1-0000/substandards/), and experiments
          # (dir under standards-experimental/). These must never be published.
          STANDARDS_CHANGED="false"
          if echo "$CHANGED_CRATES" | jq -e \
            '[.[] | select((.dir | startswith("standards/v1/APS-V1-")) and (.dir | startswith("standards/v1/APS-V1-0000") | not))] | length > 0' \
            >/dev/null; then
            STANDARDS_CHANGED="true"
          fi

          echo ""
          echo "=== Summary ==="
          echo "System changed: $SYSTEM_CHANGED"
          echo "Standards changed: $STANDARDS_CHANGED"
          echo "Tags: $TAG_LIST"
          echo "Changed crates: $(echo "$CHANGED_CRATES" | jq -c '.')"

          # Set outputs
          echo "system_changed=$SYSTEM_CHANGED" >> "$GITHUB_OUTPUT"
          echo "system_version=$SYSTEM_VERSION" >> "$GITHUB_OUTPUT"
          echo "changed_crates=$CHANGED_CRATES" >> "$GITHUB_OUTPUT"
          echo "standards_changed=$STANDARDS_CHANGED" >> "$GITHUB_OUTPUT"
          echo "tag_list=$TAG_LIST" >> "$GITHUB_OUTPUT"
          echo "has_changes=$HAS_CHANGES" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # Create git tags + GitHub Release
  # ---------------------------------------------------------------------------
  create-release:
    name: Create release
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create tags
        run: |
          set -euo pipefail
          IFS=',' read -ra TAGS <<< "${{ needs.detect-changes.outputs.tag_list }}"
          for tag in "${TAGS[@]}"; do
            if [ -n "$tag" ]; then
              echo "Creating tag: $tag"
              git tag -a "$tag" -m "Release $tag"
            fi
          done
          git push origin --tags

      - name: Extract changelog from merge commit
        id: changelog
        run: |
          set -euo pipefail

          # Get the merge commit message (which contains the PR body)
          MERGE_MSG=$(git log -1 --pretty=%B)

          # Try to extract changelog section
          CHANGELOG=$(echo "$MERGE_MSG" | sed -n '/^## \(Changelog\|Release Notes\|What.*Changed\|Changes\)/I,/^## [^C]/p' | head -n -1 || echo "$MERGE_MSG")

          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="$MERGE_MSG"
          fi

          # Write to file for the release body
          echo "$CHANGELOG" > /tmp/release-notes.md

          # Add version summary
          {
            echo ""
            echo "---"
            echo "### Versions"
            if [ "${{ needs.detect-changes.outputs.system_changed }}" = "true" ]; then
              echo "- **System**: v${{ needs.detect-changes.outputs.system_version }}"
            fi
            echo '${{ needs.detect-changes.outputs.changed_crates }}' | jq -r '.[] | "- **\(.name)**: \(.version)"'
          } >> /tmp/release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # Use system version tag as the release tag, or first standard tag
          if [ "${{ needs.detect-changes.outputs.system_changed }}" = "true" ]; then
            RELEASE_TAG="v${{ needs.detect-changes.outputs.system_version }}"
          else
            RELEASE_TAG=$(echo "${{ needs.detect-changes.outputs.tag_list }}" | cut -d',' -f1)
          fi

          gh release create "$RELEASE_TAG" \
            --title "Release $RELEASE_TAG" \
            --notes-file /tmp/release-notes.md \
            --latest

  # ---------------------------------------------------------------------------
  # Publish to crates.io (with approval gate)
  # ---------------------------------------------------------------------------
  publish:
    name: Publish to crates.io
    needs: [detect-changes, create-release]
    # Publish when the tooling system changed (apss-core + apss) OR when an
    # official standard crate changed. A standard can release independently of
    # the tooling, so standards_changed alone is enough to run this job.
    if: needs.detect-changes.outputs.system_changed == 'true' || needs.detect-changes.outputs.standards_changed == 'true'
    runs-on: ubuntu-latest
    environment: release-publish
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Publish APSS crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          SYSTEM_CHANGED: ${{ needs.detect-changes.outputs.system_changed }}
          SYSTEM_VERSION: ${{ needs.detect-changes.outputs.system_version }}
          CHANGED_CRATES: ${{ needs.detect-changes.outputs.changed_crates }}
        run: |
          set -euo pipefail

          # DI01 spec section 9.4 (as amended by ADR-0002): crates.io is the
          # standard distribution transport. Publish order:
          #   Tier 1: apss-core
          #   Tier 2: changed official standard crates (in dependency order)
          #   Tier 3: apss (last; may depend on published standards)
          # Experiments and meta-standard internal substandards are NOT published.
          publish_crate() {
            local name="$1"
            local dir="$2"
            local version="$3"

            echo "Publishing ${name}@${version} from ${dir}..."

            # Check if already published (idempotency)
            if cargo search "$name" 2>/dev/null | grep -q "^${name} = \"${version}\""; then
              echo "  Already published - skipping"
              return
            fi

            cargo publish --manifest-path "$dir/Cargo.toml"
            echo "  Published ${name}@${version}"

            # Wait for the crates.io index to update before any dependent crate
            sleep 30
          }

          # Tier 1: apss-core (only when the tooling system changed)
          if [ "$SYSTEM_CHANGED" = "true" ]; then
            publish_crate "apss-core" "crates/apss-core" "$SYSTEM_VERSION"
          else
            echo "System unchanged - skipping apss-core."
          fi

          # Tier 2: changed OFFICIAL standard crates, in dependency order.
          # Selection: changed_crates entries whose dir is under
          # standards/v1/APS-V1-XXXX-slug with XXXX != 0000. This excludes the
          # meta-standard (APS-V1-0000), its internal substandards, and
          # experiments (standards-experimental/), which must not be published.
          # apss-core is already published above, so standards resolve cleanly.
          # The substandard exclusion (no "/substandards/" segment) matters:
          # substandards ship as parent-crate cargo features and have no
          # Cargo.toml, so cargo publish on their directory would fail.
          echo "$CHANGED_CRATES" | jq -c \
            '[.[] | select((.dir | startswith("standards/v1/APS-V1-")) and (.dir | startswith("standards/v1/APS-V1-0000") | not) and (.dir | contains("/substandards/") | not))] | sort_by(.tier) | .[]' \
          | while read -r crate; do
              name=$(echo "$crate" | jq -r '.name')
              dir=$(echo "$crate" | jq -r '.dir')
              version=$(echo "$crate" | jq -r '.version')
              publish_crate "$name" "$dir" "$version"
            done

          # Tier 3: apss bootstrap binary, last (may depend on published
          # standards). Only when the tooling system changed.
          if [ "$SYSTEM_CHANGED" = "true" ]; then
            publish_crate "apss" "crates/apss-bootstrap" "$SYSTEM_VERSION"
          else
            echo "System unchanged - skipping apss."
          fi

          echo ""
          echo "APSS crates published successfully."
