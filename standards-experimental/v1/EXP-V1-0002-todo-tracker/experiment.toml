schema = "aps.experiment/v1"

[experiment]
id = "EXP-V1-0002"
name = "TODO/FIXME Tracker and Issue Validator"
slug = "todo-tracker"
version = "0.1.0"
category = "technical"
backwards_compat = true  # Set to false when introducing breaking changes

[aps]
aps_major = "v1"

[ownership]
maintainers = ["AgentParadise"]

# Promotion metadata (added after promotion, do not edit manually)
# [promotion]
# promoted_to = "APS-V1-XXXX"
# promoted_at = "YYYY-MM-DD"

[dependencies]
[[dependencies.allowed_external]]
crate = "regex"
rationale = "Pattern matching for TODO/FIXME scanning in source files"

[[dependencies.allowed_external]]
crate = "chrono"
rationale = "Timestamps for tracker entries and staleness detection"

[[dependencies.allowed_external]]
crate = "sha2"
rationale = "Content hashing for deduplication and change detection"

[[dependencies.allowed_external]]
crate = "hex"
rationale = "Hex encoding for sha2 digest display"

[[dependencies.allowed_external]]
crate = "reqwest"
rationale = "GitHub API integration for issue sync (optional feature)"

