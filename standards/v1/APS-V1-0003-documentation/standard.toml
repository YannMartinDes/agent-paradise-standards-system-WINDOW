schema = "aps.standard/v1"

[standard]
id = "APS-V1-0003"
name = "Documentation and Context Engineering"
slug = "documentation"
version = "0.1.0"
category = "governance"
status = "active"

[aps]
aps_major = "v1"
backwards_compatible_major_required = true

[ownership]
maintainers = ["AgentParadise"]

# Promotion metadata
[promotion]
promoted_from = "EXP-V1-0004"
promoted_at = "2026-06-08"

[dependencies]
[[dependencies.allowed_external]]
crate = "regex"
rationale = "ADR substandard derives backlink and reference-extraction regexes from the configured docs.adr.naming_pattern"

[[dependencies.allowed_external]]
crate = "serde"
rationale = "Workspace dependency for deserialising APSS.yaml's docs section into typed config structs"

[[dependencies.allowed_external]]
crate = "serde_json"
rationale = "Workspace dependency used by the validator for machine-readable diagnostics output"

[[dependencies.allowed_external]]
crate = "serde_yaml"
rationale = "Workspace dependency for parsing APSS.yaml during config load"

[[dependencies.allowed_external]]
crate = "walkdir"
rationale = "Workspace dependency for walking the docs root during index generation and reference scanning"

[[dependencies.allowed_external]]
crate = "glob"
rationale = "Optional dep behind AD01 feature: validates docs.backlinking.scan globs at config load (ADR-0002)"

[[dependencies.allowed_external]]
crate = "thiserror"
rationale = "Error derive for validator diagnostics surfaced through apss-core"

[[dependencies.allowed_external]]
crate = "toml"
rationale = "DI01 register() takes a toml::Value config block passed in by the unified installer"

[[dependencies.allowed_external]]
crate = "tempfile"
rationale = "Dev-only dependency used in integration tests"
